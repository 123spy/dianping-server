server:
  port: 8080
  servlet:
    context-path: /api

spring:
  application:
    name: dianping-server
  config:
    import: optional:classpath:application-local.yml
  profiles:
    active: ${SPRING_PROFILES_ACTIVE:dev}
  mvc:
    pathmatch:
      matching-strategy: ANT_PATH_MATCHER
  session:
    timeout: 30m
    redis:
      namespace: spring:session
      flush-mode: on-save
      save-mode: on-set-attribute

mybatis-plus:
  configuration:
    map-underscore-to-camel-case: false
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl
  global-config:
    db-config:
      logic-delete-field: isDelete
      logic-delete-value: 1
      logic-not-delete-value: 0

springdoc:
  api-docs:
    enabled: true
  swagger-ui:
    enabled: true

knife4j:
  enable: true

cos:
  client:
    accessKey: ${TENCENT_ACCESS_KEY:}
    secretKey: ${TENCENT_SECRET_KEY:}
    region: ${TENCENT_REGION:}
    bucket: ${TENCENT_BUCKET:}

aliyun:
  sms:
    access-key-id: ${SMS_ACCESS_KEY_ID:}
    access-key-secret: ${SMS_ACCESS_KEY_SECRET:}
    endpoint: ${SMS_ENDPOINT:dypnsapi.aliyuncs.com}
    sign-name: ${SMS_SIGN_NAME:速通互联验证码}
    template-code: ${SMS_TEMPLATE_CODE:100001}
    valid-minutes: ${SMS_VALID_MINUTES:5}
    send-cooldown-seconds: ${SMS_SEND_COOLDOWN_SECONDS:60}
    max-per-phone-per-day: ${SMS_MAX_PER_PHONE_PER_DAY:20}

logging:
  config: classpath:logback-spring.xml
  file:
    path: logs/${spring.application.name}
  level:
    root: INFO
    com.spy.server: INFO
